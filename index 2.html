<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四川数字教材</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --white:#ffffff;
  --snow:#f9fafb;
  --cloud:#f3f4f6;
  --mist:#e5e7eb;
  --silver:#d1d5db;
  --stone:#9ca3af;
  --slate:#6b7280;
  --ink:#374151;
  --deep:#1f2937;

  --mint:#d2f0e2;
  --mint-mid:#6dc4a0;
  --mint-deep:#3a9e78;
  --sky:#d6e8f8;
  --sky-mid:#6ea8d8;
  --sky-deep:#3d80b8;
  --peach:#fce6d5;
  --peach-mid:#e8a47a;
  --peach-deep:#cc7a42;
  --lavender:#e2d6f2;
  --lavender-mid:#a580d0;
  --lavender-deep:#7a4eb0;
  --rose:#f9dae2;
  --rose-mid:#e48a9e;
  --rose-deep:#c45c74;
  --lemon:#fcf3d2;
  --lemon-mid:#e0c45a;
  --lemon-deep:#b89a2e;
  --ice:#d4eef5;
  --ice-mid:#6abed8;
  --ice-deep:#3a92b0;
  --sand:#f0e8d8;
  --sand-mid:#c4aa78;
  --sand-deep:#96784a;

  --sidebar-w:240px;
  --radius:14px;
  --transition:0.3s ease;
}

html{font-size:16px}
body{
  font-family:'Noto Sans SC',system-ui,sans-serif;
  background:var(--snow);
  color:var(--ink);
  overflow:hidden;height:100vh;
  -webkit-font-smoothing:antialiased;
}

.app{display:flex;height:100vh}

/* ===== SIDEBAR — LIGHT ===== */
.sidebar{
  width:var(--sidebar-w);
  background:var(--white);
  border-right:1px solid var(--cloud);
  display:flex;flex-direction:column;
  flex-shrink:0;
}

.sidebar-head{padding:28px 22px 20px}

.logo-row{display:flex;align-items:center;gap:12px}

.logo-icon{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--mint-deep),var(--sky-mid));
  display:flex;align-items:center;justify-content:center;
  font-family:'ZCOOL XiaoWei',serif;font-size:18px;color:var(--white);
  box-shadow:0 3px 14px rgba(58,158,120,0.25);
}

.logo-col{display:flex;flex-direction:column;gap:1px}
.logo-name{font-family:'ZCOOL XiaoWei',serif;font-size:15px;color:var(--deep);letter-spacing:1px}
.logo-en{font-size:9px;color:var(--stone);letter-spacing:2px;font-weight:300}

/* Nav */
.sidebar-nav{flex:1;padding:6px 10px;display:flex;flex-direction:column;gap:1px}

.nav-label{
  font-size:10px;letter-spacing:3px;
  color:var(--silver);padding:18px 14px 8px;font-weight:500;
}

.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:10px;
  cursor:pointer;transition:var(--transition);
  color:var(--slate);font-size:13.5px;font-weight:400;
  position:relative;
}

.nav-item:hover{color:var(--ink);background:var(--snow)}

.nav-item.active{
  color:var(--mint-deep);
  background:var(--mint);
  font-weight:500;
}

.nav-item svg{width:18px;height:18px;opacity:0.5;flex-shrink:0}
.nav-item.active svg{opacity:0.9}

.nav-num{
  margin-left:auto;font-size:11px;font-weight:500;
  color:var(--stone);background:var(--cloud);
  padding:2px 9px;border-radius:12px;
}

.nav-item.active .nav-num{
  color:var(--mint-deep);background:rgba(58,158,120,0.14);
}

/* Footer */
.sidebar-foot{
  padding:14px 16px 24px;
  border-top:1px solid var(--cloud);
}

.user-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 10px;border-radius:10px;
  cursor:pointer;transition:var(--transition);
}
.user-row:hover{background:var(--snow)}

.avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--peach-mid),var(--rose-mid));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:500;color:var(--white);
}

.user-meta{display:flex;flex-direction:column;gap:1px}
.user-name{font-size:13px;color:var(--ink);font-weight:500}
.user-role{font-size:10.5px;color:var(--stone)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--snow)}

/* Header */
.topbar{
  height:64px;padding:0 36px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(249,250,251,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--cloud);
  flex-shrink:0;
}

.topbar-left{display:flex;align-items:center;gap:14px}

.topbar-title{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:20px;color:var(--deep);letter-spacing:1px;
}

.topbar-sep{width:1px;height:16px;background:var(--mist)}
.topbar-hint{font-size:12.5px;color:var(--stone);font-weight:300}

.topbar-right{display:flex;align-items:center;gap:10px}

.search-box{
  display:flex;align-items:center;gap:9px;
  background:var(--white);border:1px solid var(--mist);
  border-radius:10px;padding:9px 16px;width:280px;
  transition:var(--transition);
}

.search-box:focus-within{
  border-color:var(--mint-mid);
  box-shadow:0 0 0 3px rgba(58,158,120,0.1);
}

.search-box input{
  border:none;outline:none;background:none;
  font-family:inherit;font-size:12.5px;color:var(--ink);
  width:100%;font-weight:300;
}
.search-box input::placeholder{color:var(--silver)}
.search-box svg{flex-shrink:0;color:var(--silver)}

.tb-btn{
  width:38px;height:38px;border-radius:10px;
  border:1px solid var(--mist);background:var(--white);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--transition);color:var(--slate);
}
.tb-btn:hover{border-color:var(--mint-mid);color:var(--mint-deep);background:var(--mint)}

/* Scroll area */
.scroll{flex:1;overflow-y:auto;padding:28px 36px 44px}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-track{background:transparent}
.scroll::-webkit-scrollbar-thumb{background:var(--mist);border-radius:2px}

/* Filters — light pills */
.filters{display:flex;align-items:center;gap:7px;margin-bottom:28px;flex-wrap:wrap}

.pill{
  padding:7px 18px;border-radius:8px;font-size:12.5px;
  cursor:pointer;transition:var(--transition);
  color:var(--slate);background:var(--white);
  border:1px solid var(--mist);font-weight:400;
}
.pill:hover{border-color:var(--silver);color:var(--ink)}

.pill.active{
  background:var(--mint);color:var(--mint-deep);
  border-color:var(--mint-mid);font-weight:500;
}

.pill-sep{width:1px;height:20px;background:var(--mist);margin:0 4px}

/* Section header */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}

.sec-title{
  font-size:15px;font-weight:500;color:var(--deep);
  display:flex;align-items:center;gap:10px;
}

.sec-title .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--mint-mid);
}

.sec-extra{font-size:12px;color:var(--stone);font-weight:300;cursor:pointer;transition:var(--transition)}
.sec-extra:hover{color:var(--mint-deep)}

/* ===== BOOK CARDS ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:20px;margin-bottom:40px;
}

.card{
  background:var(--white);
  border:1px solid var(--cloud);
  border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  transition:var(--transition);
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 8px 30px rgba(0,0,0,0.09);
  border-color:var(--silver);
}

/* Pastel gradient covers */
.cover{aspect-ratio:3/4;position:relative;overflow:hidden}

.cover-inner{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:26px 18px;position:relative;
}

/* Soft circular decoration */
.cover-inner::before{
  content:'';position:absolute;
  top:-20%;right:-20%;width:70%;height:70%;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  pointer-events:none;
}

.cover-inner::after{
  content:'';position:absolute;
  bottom:-15%;left:-15%;width:50%;height:50%;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  pointer-events:none;
}

.cover-grade{
  font-size:10px;font-weight:500;
  color:rgba(255,255,255,0.85);
  background:rgba(255,255,255,0.2);
  padding:4px 14px;border-radius:20px;
  margin-bottom:12px;letter-spacing:2px;z-index:1;
}

.cover-name{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:28px;color:white;text-align:center;
  z-index:1;letter-spacing:4px;line-height:1.35;
  text-shadow:0 2px 10px rgba(0,0,0,0.15);
}

.cover-sub{
  font-size:10.5px;color:rgba(255,255,255,0.7);
  margin-top:8px;z-index:1;letter-spacing:1px;font-weight:300;
}

.detail{padding:14px 16px 16px}

.detail-title{
  font-size:13px;font-weight:500;color:var(--ink);
  margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.detail-row{display:flex;align-items:center;justify-content:space-between}
.detail-pub{font-size:10.5px;color:var(--stone);font-weight:300}

.tag{font-size:10px;padding:3px 9px;border-radius:6px;font-weight:500}
.tag-req{background:var(--sky);color:var(--sky-deep)}
.tag-opt{background:var(--lavender);color:var(--lavender-deep)}

/* Progress */
.prog{margin-top:10px;display:flex;align-items:center;gap:9px}

.prog-track{
  flex:1;height:4px;background:var(--cloud);
  border-radius:2px;overflow:hidden;
}

.prog-fill{height:100%;border-radius:2px;transition:width 0.8s ease}
.prog-pct{font-size:10.5px;color:var(--stone);font-weight:500;min-width:32px;text-align:right}

/* Card status */
.card-st{
  position:absolute;top:12px;right:12px;z-index:3;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

.st-ok{background:rgba(255,255,255,0.6);color:var(--mint-deep);backdrop-filter:blur(6px)}
.st-cl{background:rgba(255,255,255,0.4);color:var(--slate);backdrop-filter:blur(6px)}

/* Stats */
.stats{display:flex;gap:16px;margin-bottom:28px}

.stat-box{
  flex:1;background:var(--white);border:1px solid var(--cloud);
  border-radius:var(--radius);padding:20px 22px;
  display:flex;align-items:center;gap:16px;
  transition:var(--transition);
}
.stat-box:hover{box-shadow:0 4px 16px rgba(0,0,0,0.06)}

.stat-ic{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
}

.si-mint{background:var(--mint);color:var(--mint-deep)}
.si-sky{background:var(--sky);color:var(--sky-deep)}
.si-peach{background:var(--peach);color:var(--peach-deep)}

.stat-data{display:flex;flex-direction:column;gap:2px}
.stat-val{font-size:24px;font-weight:600;color:var(--deep)}
.stat-lab{font-size:11px;color:var(--stone);font-weight:300}

/* Pages */
.page{display:none}
.page.active{display:block;animation:fadeUp 0.4s ease}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

.card{opacity:0;animation:cardIn 0.35s ease forwards}
@keyframes cardIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== BOOK DETAIL OVERLAY ===== */
.overlay{
  position:fixed;inset:0;z-index:100;
  display:none;align-items:center;justify-content:center;
}
.overlay.open{display:flex}

.overlay-bg{
  position:absolute;inset:0;
  background:rgba(31,41,55,0.3);
  backdrop-filter:blur(6px);
  animation:bgIn 0.3s ease;
}
@keyframes bgIn{from{opacity:0}to{opacity:1}}

.detail-panel{
  position:relative;z-index:1;
  width:860px;max-width:calc(100vw - 80px);
  max-height:calc(100vh - 60px);
  background:var(--white);
  border-radius:20px;
  box-shadow:0 24px 80px rgba(0,0,0,0.12);
  display:flex;flex-direction:column;
  overflow:hidden;
  animation:panelIn 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes panelIn{
  from{opacity:0;transform:translateY(20px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Close button */
.detail-close{
  position:absolute;top:18px;right:18px;z-index:5;
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--mist);background:var(--white);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--transition);color:var(--slate);
}
.detail-close:hover{background:var(--cloud);color:var(--deep)}

/* Top hero section */
.detail-hero{
  display:flex;gap:32px;padding:36px 36px 28px;
  border-bottom:1px solid var(--cloud);
  flex-shrink:0;
}

.detail-cover{
  width:160px;height:213px;
  border-radius:12px;overflow:hidden;
  flex-shrink:0;
  box-shadow:0 8px 28px rgba(0,0,0,0.1);
}

.detail-cover .cover-inner{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px 14px;position:relative;
}

.detail-cover .cover-inner::before{
  content:'';position:absolute;
  top:-20%;right:-20%;width:70%;height:70%;
  border-radius:50%;background:rgba(255,255,255,0.15);pointer-events:none;
}

.detail-cover .cover-name{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:26px;color:white;text-align:center;
  letter-spacing:4px;line-height:1.3;
  text-shadow:0 2px 10px rgba(0,0,0,0.15);
}

.detail-cover .cover-sub{
  font-size:10px;color:rgba(255,255,255,0.7);
  margin-top:6px;letter-spacing:1px;font-weight:300;
}

/* Book info */
.detail-info{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0}

.detail-book-title{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:24px;color:var(--deep);letter-spacing:1px;
  margin-bottom:6px;
}

.detail-book-sub{
  font-size:14px;color:var(--slate);font-weight:300;margin-bottom:18px;
}

.detail-meta-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;
  margin-bottom:22px;
}

.meta-item{display:flex;align-items:center;gap:8px}
.meta-label{font-size:12px;color:var(--stone);min-width:48px}
.meta-value{font-size:13px;color:var(--ink);font-weight:400}

.detail-actions{display:flex;gap:10px;align-items:center}

.btn-buy{
  padding:10px 32px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--mint-deep),var(--sky-mid));
  color:white;font-size:14px;font-weight:500;
  cursor:pointer;transition:var(--transition);
  font-family:inherit;letter-spacing:0.5px;
  box-shadow:0 3px 14px rgba(58,158,120,0.2);
}
.btn-buy:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(58,158,120,0.3);
}

.btn-buy.purchased{
  background:var(--mint);color:var(--mint-deep);
  box-shadow:none;cursor:default;
}
.btn-buy.purchased:hover{transform:none;box-shadow:none}

.btn-trial{
  padding:10px 24px;border-radius:10px;
  border:1px solid var(--mist);background:var(--white);
  color:var(--ink);font-size:13px;font-weight:400;
  cursor:pointer;transition:var(--transition);font-family:inherit;
}
.btn-trial:hover{border-color:var(--silver);background:var(--snow)}

.detail-price{
  margin-left:8px;
  font-size:22px;font-weight:600;color:var(--peach-deep);
  font-family:'ZCOOL XiaoWei',serif;
}

.detail-price-orig{
  font-size:12px;color:var(--silver);text-decoration:line-through;
  font-weight:300;margin-left:4px;
}

/* Tabs section */
.detail-body{flex:1;overflow:hidden;display:flex;flex-direction:column}

.detail-tabs{
  display:flex;gap:0;padding:0 36px;
  border-bottom:1px solid var(--cloud);
  flex-shrink:0;
}

.detail-tab{
  padding:14px 24px;font-size:13.5px;
  color:var(--slate);cursor:pointer;
  position:relative;transition:var(--transition);
  font-weight:400;
}

.detail-tab:hover{color:var(--ink)}

.detail-tab.active{color:var(--mint-deep);font-weight:500}

.detail-tab.active::after{
  content:'';position:absolute;
  bottom:-1px;left:24px;right:24px;height:2px;
  background:var(--mint-deep);border-radius:1px;
}

.detail-content{
  flex:1;overflow-y:auto;padding:24px 36px 36px;
}

.detail-content::-webkit-scrollbar{width:4px}
.detail-content::-webkit-scrollbar-track{background:transparent}
.detail-content::-webkit-scrollbar-thumb{background:var(--mist);border-radius:2px}

/* Tab content */
.tab-pane{display:none;animation:fadeUp 0.3s ease}
.tab-pane.active{display:block}

/* Introduction */
.intro-section{margin-bottom:24px}
.intro-heading{
  font-size:14px;font-weight:500;color:var(--deep);
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.intro-heading .bar{
  width:3px;height:14px;border-radius:2px;
  background:var(--mint-mid);
}
.intro-text{
  font-size:13.5px;line-height:1.9;color:var(--slate);
  font-weight:300;text-align:justify;
}

.intro-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.intro-tag{
  padding:5px 14px;border-radius:6px;font-size:11px;
  background:var(--cloud);color:var(--slate);font-weight:400;
}

/* Table of Contents */
.toc-list{list-style:none}

.toc-unit{margin-bottom:6px}

.toc-unit-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-radius:10px;
  cursor:pointer;transition:var(--transition);
  font-size:14px;font-weight:500;color:var(--deep);
}
.toc-unit-head:hover{background:var(--snow)}

.toc-unit-num{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;flex-shrink:0;
}

.toc-unit-arrow{
  margin-left:auto;color:var(--silver);
  transition:var(--transition);
}

.toc-unit.open .toc-unit-arrow{transform:rotate(90deg)}

.toc-lessons{
  max-height:0;overflow:hidden;
  transition:max-height 0.35s ease;
}
.toc-unit.open .toc-lessons{max-height:600px}

.toc-lesson{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px 10px 54px;
  font-size:13px;color:var(--slate);font-weight:300;
  cursor:pointer;transition:var(--transition);
  border-radius:8px;margin:1px 0;
}
.toc-lesson:hover{background:var(--snow);color:var(--ink)}

.toc-lesson-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--silver);flex-shrink:0;
}

.toc-lesson-lock{margin-left:auto;color:var(--silver)}

/* ===== REDEEM MODAL ===== */
.redeem-overlay{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:center;justify-content:center;
}
.redeem-overlay.open{display:flex}

.redeem-bg{
  position:absolute;inset:0;
  background:rgba(31,41,55,0.35);
  backdrop-filter:blur(4px);
}

.redeem-box{
  position:relative;z-index:1;
  width:420px;max-width:calc(100vw - 60px);
  background:var(--white);border-radius:18px;
  padding:32px;
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
  animation:panelIn 0.3s ease;
}

.redeem-title{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:18px;color:var(--deep);margin-bottom:6px;
}

.redeem-desc{font-size:13px;color:var(--stone);font-weight:300;margin-bottom:22px}

.redeem-input-row{
  display:flex;gap:10px;margin-bottom:16px;
}

.redeem-input{
  flex:1;padding:11px 16px;border-radius:10px;
  border:1.5px solid var(--mist);background:var(--snow);
  font-family:inherit;font-size:13.5px;color:var(--ink);
  outline:none;transition:var(--transition);
  letter-spacing:2px;text-transform:uppercase;
}

.redeem-input:focus{
  border-color:var(--mint-mid);
  box-shadow:0 0 0 3px rgba(58,158,120,0.1);
}

.redeem-input::placeholder{color:var(--silver);letter-spacing:0;text-transform:none}

.btn-redeem{
  padding:11px 24px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--lavender-deep),var(--sky-deep));
  color:white;font-size:13.5px;font-weight:500;
  cursor:pointer;transition:var(--transition);
  font-family:inherit;white-space:nowrap;
}
.btn-redeem:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(122,78,176,0.2)}

.redeem-hint{font-size:11.5px;color:var(--stone);font-weight:300;line-height:1.6}

.redeem-close{
  position:absolute;top:16px;right:16px;
  width:30px;height:30px;border-radius:50%;
  border:1px solid var(--mist);background:var(--white);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--transition);color:var(--slate);
}
.redeem-close:hover{background:var(--cloud);color:var(--deep)}

.redeem-success{
  display:none;text-align:center;padding:10px 0 6px;
}
.redeem-success.show{display:block;animation:fadeUp 0.3s ease}

.redeem-success-icon{
  width:52px;height:52px;border-radius:50%;
  background:var(--mint);color:var(--mint-deep);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;
}

.redeem-success-text{font-size:15px;font-weight:500;color:var(--deep);margin-bottom:4px}
.redeem-success-sub{font-size:12px;color:var(--stone);font-weight:300}

/* ===== PRINT BUTTON ===== */
.btn-print{
  padding:10px 20px;border-radius:10px;
  border:1px solid var(--mist);background:var(--white);
  color:var(--ink);font-size:13px;font-weight:400;
  cursor:pointer;transition:var(--transition);
  font-family:inherit;display:flex;align-items:center;gap:6px;
}
.btn-print:hover{border-color:var(--silver);background:var(--snow)}

/* ===== MODE CARDS (for 我的教材 detail) ===== */
.mode-section{margin-top:28px}

.mode-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:14px;margin-top:14px;
}

.mode-card{
  display:flex;align-items:center;gap:16px;
  padding:18px 20px;border-radius:14px;
  border:1.5px solid var(--cloud);
  background:var(--white);
  cursor:pointer;transition:var(--transition);
  position:relative;overflow:hidden;
}

.mode-card:hover{
  border-color:var(--silver);
  box-shadow:0 4px 16px rgba(0,0,0,0.05);
  transform:translateY(-2px);
}

.mode-card::before{
  content:'';position:absolute;inset:0;
  opacity:0;transition:var(--transition);
  pointer-events:none;border-radius:14px;
}
.mode-card:hover::before{opacity:1}

.mode-card:nth-child(1)::before{background:linear-gradient(135deg,rgba(58,158,120,0.04),transparent)}
.mode-card:nth-child(2)::before{background:linear-gradient(135deg,rgba(110,168,216,0.04),transparent)}
.mode-card:nth-child(3)::before{background:linear-gradient(135deg,rgba(204,122,66,0.04),transparent)}
.mode-card:nth-child(4)::before{background:linear-gradient(135deg,rgba(165,128,208,0.04),transparent)}

.mode-icon{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

.mi-read{background:var(--mint);color:var(--mint-deep)}
.mi-av{background:var(--sky);color:var(--sky-deep)}
.mi-task{background:var(--peach);color:var(--peach-deep)}
.mi-kg{background:var(--lavender);color:var(--lavender-deep)}

.mode-info{display:flex;flex-direction:column;gap:3px;min-width:0}
.mode-name{font-size:14px;font-weight:500;color:var(--deep)}
.mode-desc{font-size:11.5px;color:var(--stone);font-weight:300;line-height:1.4}

.mode-arrow{
  margin-left:auto;color:var(--silver);
  flex-shrink:0;transition:var(--transition);
}
.mode-card:hover .mode-arrow{color:var(--slate);transform:translateX(2px)}

/* ===== CLASS GROUP MANAGEMENT ===== */
.class-section{margin-top:44px}

.class-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;margin-top:18px;
}

.class-card{
  background:var(--white);border:1.5px solid var(--cloud);
  border-radius:var(--radius);padding:22px;
  cursor:pointer;transition:var(--transition);
  position:relative;overflow:hidden;
}
.class-card:hover{
  border-color:var(--silver);
  box-shadow:0 6px 24px rgba(0,0,0,0.07);
  transform:translateY(-3px);
}
.class-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  border-radius:var(--radius) var(--radius) 0 0;
}
.class-card:nth-child(1)::before{background:linear-gradient(90deg,var(--mint-deep),var(--mint-mid))}
.class-card:nth-child(2)::before{background:linear-gradient(90deg,var(--sky-deep),var(--sky-mid))}
.class-card:nth-child(3)::before{background:linear-gradient(90deg,var(--peach-deep),var(--peach-mid))}
.class-card:nth-child(4)::before{background:linear-gradient(90deg,var(--lavender-deep),var(--lavender-mid))}
.class-card:nth-child(5)::before{background:linear-gradient(90deg,var(--rose-deep),var(--rose-mid))}

.class-card-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.class-card-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.class-card:nth-child(1) .class-card-icon{background:var(--mint);color:var(--mint-deep)}
.class-card:nth-child(2) .class-card-icon{background:var(--sky);color:var(--sky-deep)}
.class-card:nth-child(3) .class-card-icon{background:var(--peach);color:var(--peach-deep)}
.class-card:nth-child(4) .class-card-icon{background:var(--lavender);color:var(--lavender-deep)}
.class-card:nth-child(5) .class-card-icon{background:var(--rose);color:var(--rose-deep)}

.class-card-info{display:flex;flex-direction:column;gap:3px;min-width:0}
.class-card-name{font-size:15px;font-weight:500;color:var(--deep);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.class-card-sub{font-size:11.5px;color:var(--stone);font-weight:300}

.class-card-stats{display:flex;gap:20px;margin-bottom:14px}
.class-stat{display:flex;flex-direction:column;gap:2px}
.class-stat-val{font-size:18px;font-weight:600;color:var(--deep)}
.class-stat-lab{font-size:10.5px;color:var(--stone);font-weight:300}

.class-card-bar{height:4px;border-radius:2px;background:var(--cloud);overflow:hidden}
.class-card-bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease}

.class-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.class-card-date{font-size:11px;color:var(--silver);font-weight:300}
.class-card-arrow{color:var(--silver);transition:var(--transition)}
.class-card:hover .class-card-arrow{color:var(--slate);transform:translateX(3px)}

/* Create class button card */
.class-card-create{
  background:var(--snow);border:2px dashed var(--mist);
  border-radius:var(--radius);padding:22px;
  cursor:pointer;transition:var(--transition);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:180px;gap:12px;
}
.class-card-create::before{display:none}
.class-card-create:hover{
  border-color:var(--mint-mid);background:var(--mint);
  transform:translateY(-3px);
}
.class-create-icon{
  width:52px;height:52px;border-radius:50%;
  background:var(--white);border:2px dashed var(--mist);
  display:flex;align-items:center;justify-content:center;
  color:var(--stone);transition:var(--transition);
}
.class-card-create:hover .class-create-icon{
  border-color:var(--mint-mid);color:var(--mint-deep);background:var(--white);
}
.class-create-text{font-size:13.5px;color:var(--slate);font-weight:400;transition:var(--transition)}
.class-card-create:hover .class-create-text{color:var(--mint-deep)}

/* ===== CREATE CLASS MODAL ===== */
.create-class-overlay{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.25s ease;
}
.create-class-overlay.open{opacity:1;pointer-events:all}
.create-class-bg{position:absolute;inset:0;background:rgba(31,41,55,0.35);backdrop-filter:blur(4px)}

.create-class-box{
  position:relative;z-index:1;
  background:var(--white);border-radius:20px;
  padding:32px 34px 28px;width:440px;max-width:92vw;
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
  animation:panelIn 0.3s ease;
}

.create-class-close{
  position:absolute;top:16px;right:16px;
  width:30px;height:30px;border-radius:8px;
  border:none;background:var(--snow);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--stone);transition:var(--transition);
}
.create-class-close:hover{background:var(--cloud);color:var(--ink)}

.ccm-title{font-size:18px;font-weight:500;color:var(--deep);margin-bottom:4px}
.ccm-desc{font-size:12.5px;color:var(--stone);font-weight:300;margin-bottom:24px}

.ccm-field{margin-bottom:18px}
.ccm-label{font-size:12.5px;color:var(--slate);font-weight:500;margin-bottom:7px;display:block}
.ccm-input{
  width:100%;padding:11px 16px;border-radius:10px;
  border:1.5px solid var(--mist);background:var(--snow);
  font-family:inherit;font-size:13.5px;color:var(--ink);
  transition:var(--transition);outline:none;
}
.ccm-input:focus{border-color:var(--mint-mid);box-shadow:0 0 0 3px rgba(58,158,120,0.1);background:var(--white)}
.ccm-input::placeholder{color:var(--silver)}

.ccm-select{
  width:100%;padding:11px 16px;border-radius:10px;
  border:1.5px solid var(--mist);background:var(--snow);
  font-family:inherit;font-size:13.5px;color:var(--ink);
  transition:var(--transition);outline:none;cursor:pointer;
  appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 14px center;
}
.ccm-select:focus{border-color:var(--mint-mid);box-shadow:0 0 0 3px rgba(58,158,120,0.1)}

.ccm-btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--mint-deep),var(--sky-mid));
  color:var(--white);font-family:inherit;font-size:14px;font-weight:500;
  cursor:pointer;transition:var(--transition);margin-top:8px;
}
.ccm-btn:hover{box-shadow:0 4px 16px rgba(58,158,120,0.3);transform:translateY(-1px)}

/* ===== CLASS DETAIL OVERLAY ===== */
.class-overlay{
  position:fixed;inset:0;z-index:150;
  opacity:0;pointer-events:none;transition:opacity 0.3s ease;
}
.class-overlay.open{opacity:1;pointer-events:all}
.class-overlay-bg{position:absolute;inset:0;background:rgba(31,41,55,0.3);backdrop-filter:blur(6px)}

.class-panel{
  position:absolute;top:0;right:0;bottom:0;
  width:680px;max-width:100vw;
  background:var(--white);
  box-shadow:-12px 0 50px rgba(0,0,0,0.1);
  overflow-y:auto;animation:panelIn 0.35s ease;
}
.class-panel::-webkit-scrollbar{width:4px}
.class-panel::-webkit-scrollbar-thumb{background:var(--mist);border-radius:2px}

.class-detail-close{
  position:absolute;top:20px;right:20px;z-index:2;
  width:34px;height:34px;border-radius:10px;
  border:1px solid var(--cloud);background:var(--white);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--slate);transition:var(--transition);
}
.class-detail-close:hover{background:var(--snow);color:var(--ink)}

.class-detail-header{
  padding:36px 32px 28px;
  border-bottom:1px solid var(--cloud);
}
.class-detail-name{font-size:22px;font-weight:600;color:var(--deep);margin-bottom:4px}
.class-detail-meta{font-size:12.5px;color:var(--stone);font-weight:300;display:flex;gap:16px;align-items:center}
.class-detail-meta span{display:flex;align-items:center;gap:4px}

/* Invite section */
.invite-section{
  padding:24px 32px;border-bottom:1px solid var(--cloud);
  display:flex;gap:28px;align-items:flex-start;
}

.invite-code-box{flex:1}
.invite-label{font-size:12px;color:var(--stone);font-weight:500;margin-bottom:10px;letter-spacing:1px}
.invite-code-display{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;border-radius:12px;
  background:var(--snow);border:1.5px solid var(--cloud);
}
.invite-code-text{
  font-size:22px;font-weight:600;color:var(--deep);
  letter-spacing:4px;font-family:'Noto Sans SC',monospace;
}
.invite-copy-btn{
  margin-left:auto;padding:7px 14px;border-radius:8px;
  border:1px solid var(--mist);background:var(--white);
  font-family:inherit;font-size:12px;color:var(--slate);
  cursor:pointer;transition:var(--transition);
}
.invite-copy-btn:hover{border-color:var(--mint-mid);color:var(--mint-deep);background:var(--mint)}
.invite-copy-btn.copied{border-color:var(--mint-mid);color:var(--mint-deep);background:var(--mint)}

.invite-qr-box{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.qr-canvas{
  width:120px;height:120px;border-radius:12px;
  background:var(--white);border:1.5px solid var(--cloud);
  padding:8px;display:flex;align-items:center;justify-content:center;
}
.qr-hint{font-size:10.5px;color:var(--stone);font-weight:300}

/* Stats row */
.class-stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:14px;padding:24px 32px;border-bottom:1px solid var(--cloud);
}
.cs-box{
  text-align:center;padding:16px 8px;border-radius:12px;
  background:var(--snow);
}
.cs-val{font-size:22px;font-weight:600;color:var(--deep);margin-bottom:2px}
.cs-lab{font-size:11px;color:var(--stone);font-weight:300}

/* Student list */
.student-section{padding:24px 32px 36px}
.student-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.student-title{font-size:14px;font-weight:500;color:var(--deep);display:flex;align-items:center;gap:8px}
.student-count{font-size:11px;color:var(--stone);font-weight:300;background:var(--cloud);padding:3px 10px;border-radius:12px}

.student-list{display:flex;flex-direction:column;gap:2px}

.student-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:10px;
  transition:var(--transition);
}
.student-row:hover{background:var(--snow)}

.student-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:500;color:var(--white);flex-shrink:0;
}
.student-info{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.student-name{font-size:13.5px;font-weight:500;color:var(--deep)}
.student-id{font-size:11px;color:var(--stone);font-weight:300}

.student-progress{width:120px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.student-bar{flex:1;height:4px;border-radius:2px;background:var(--cloud);overflow:hidden}
.student-bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.student-pct{font-size:12px;font-weight:500;min-width:36px;text-align:right}

.student-books{font-size:12px;color:var(--stone);font-weight:300;flex-shrink:0;min-width:48px;text-align:center}
.student-last{font-size:11px;color:var(--silver);font-weight:300;flex-shrink:0;min-width:70px;text-align:right}

/* Rank badge */
.student-rank{
  width:22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;flex-shrink:0;
}
.rank-1{background:var(--lemon);color:var(--lemon-deep)}
.rank-2{background:var(--cloud);color:var(--slate)}
.rank-3{background:var(--peach);color:var(--peach-deep)}
.rank-other{background:transparent;color:var(--silver)}

/* Admin badge */
.admin-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:6px;font-size:10.5px;font-weight:600;
  background:linear-gradient(135deg,#f0c040,#e8a020);color:#7a5c00;
  letter-spacing:0.5px;
}
.admin-badge svg{width:12px;height:12px}

.class-card-admin{
  position:absolute;top:14px;right:14px;
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;
  background:linear-gradient(135deg,#f0c040,#e8a020);color:#7a5c00;
}

/* Class books section in detail */
.class-books-section{padding:24px 32px;border-bottom:1px solid var(--cloud)}
.class-books-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.class-books-title{font-size:14px;font-weight:500;color:var(--deep);display:flex;align-items:center;gap:8px}
.class-books-count{font-size:11px;color:var(--stone);font-weight:300;background:var(--cloud);padding:3px 10px;border-radius:12px}

.btn-add-book{
  padding:7px 14px;border-radius:8px;border:1px solid var(--mist);
  background:var(--white);font-family:inherit;font-size:12px;color:var(--slate);
  cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:5px;
}
.btn-add-book:hover{border-color:var(--mint-mid);color:var(--mint-deep);background:var(--mint)}

.class-book-list{display:flex;flex-direction:column;gap:8px}

.class-book-row{
  display:flex;align-items:center;gap:14px;
  padding:12px 14px;border-radius:10px;
  background:var(--snow);border:1px solid var(--cloud);
  transition:var(--transition);
}
.class-book-row:hover{border-color:var(--silver)}

.class-book-cover{
  width:38px;height:50px;border-radius:6px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px;
}
.class-book-cover-name{font-size:9px;font-weight:600;color:rgba(255,255,255,0.95);text-align:center;line-height:1.2}

.class-book-info{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.class-book-name{font-size:13px;font-weight:500;color:var(--deep)}
.class-book-pub{font-size:11px;color:var(--stone);font-weight:300}

.class-book-avg{
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;
}
.class-book-avg-val{font-size:14px;font-weight:600}
.class-book-avg-lab{font-size:10px;color:var(--stone);font-weight:300}

.class-book-remove{
  width:28px;height:28px;border-radius:6px;border:none;
  background:transparent;cursor:pointer;color:var(--silver);
  display:flex;align-items:center;justify-content:center;
  transition:var(--transition);flex-shrink:0;
}
.class-book-remove:hover{background:var(--rose);color:var(--rose-deep)}

/* Add book picker overlay */
.book-picker-overlay{
  position:fixed;inset:0;z-index:250;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.25s ease;
}
.book-picker-overlay.open{opacity:1;pointer-events:all}
.book-picker-bg{position:absolute;inset:0;background:rgba(31,41,55,0.35);backdrop-filter:blur(4px)}

.book-picker-box{
  position:relative;z-index:1;
  background:var(--white);border-radius:20px;
  padding:28px 30px 24px;width:480px;max-width:92vw;max-height:80vh;
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
  animation:panelIn 0.3s ease;display:flex;flex-direction:column;
}
.book-picker-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:8px;
  border:none;background:var(--snow);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--stone);transition:var(--transition);
}
.book-picker-close:hover{background:var(--cloud);color:var(--ink)}

.bp-title{font-size:16px;font-weight:500;color:var(--deep);margin-bottom:4px}
.bp-desc{font-size:12px;color:var(--stone);font-weight:300;margin-bottom:18px}

.bp-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:4px}
.bp-list::-webkit-scrollbar{width:3px}
.bp-list::-webkit-scrollbar-thumb{background:var(--mist);border-radius:2px}

.bp-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:10px;
  border:1.5px solid var(--cloud);cursor:pointer;
  transition:var(--transition);
}
.bp-item:hover{border-color:var(--silver);background:var(--snow)}
.bp-item.added{opacity:0.45;pointer-events:none}
.bp-item.added::after{
  content:'已添加';font-size:11px;color:var(--stone);
  margin-left:auto;font-weight:400;
}

.bp-cover{
  width:34px;height:44px;border-radius:5px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.bp-cover-name{font-size:8px;font-weight:600;color:rgba(255,255,255,0.95)}

// Auto-format redeem code (add dashes)
document.getElementById('redeemCode').addEventListener('input',function(e){
  let v=this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  if(v.length>16) v=v.slice(0,16);
  let formatted='';
  for(let i=0;i<v.length;i++){
    if(i>0 && i%4===0) formatted+='-';
    formatted+=v[i];
  }
  this.value=formatted;
});

function drawQR(canvas,text){
  // Simple visual QR-like pattern (decorative)
  const ctx=canvas.getContext('2d');
  const s=canvas.width;ctx.clearRect(0,0,s,s);
  const grid=21,cell=Math.floor(s/grid);
  // Seed from text
  let seed=0;for(let i=0;i<text.length;i++)seed=(seed*31+text.charCodeAt(i))&0x7fffffff;
  function rng(){seed=(seed*16807)%2147483647;return seed/2147483647}
  // Draw modules
  ctx.fillStyle='#1f2937';
  for(let r=0;r<grid;r++)for(let cl=0;cl<grid;cl++){
    // Fixed patterns (finder)
    const inFinder=(r<7&&cl<7)||(r<7&&cl>=grid-7)||(r>=grid-7&&cl<7);
    if(inFinder){
      const fr=r<7?0:grid-7,fc=cl<7?0:grid-7;
      const lr=r-fr,lc=cl-fc;
      if(lr===0||lr===6||lc===0||lc===6||(lr>=2&&lr<=4&&lc>=2&&lc<=4))
        ctx.fillRect(cl*cell,r*cell,cell,cell);
    } else if(rng()>0.5){
      ctx.fillRect(cl*cell,r*cell,cell,cell);
    }
  }
}

function closeClassDetail(){
  document.getElementById('classOverlay').classList.remove('open');
  document.body.style.overflow='';
}

function copyCode(btn,code){
  navigator.clipboard.writeText(code).catch(()=>{});
  btn.textContent='已复制';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='复制';btn.classList.remove('copied')},2000);
}

function openBookPicker(classIdx){
  currentClassIdx=classIdx;
  const cls=classGroups[classIdx];
  const list=document.getElementById('bpList');
  list.innerHTML=myB.map((bk,i)=>{
    const [c1,c2]=c(bk.sub);
    const already=cls.books.some(cb=>cb.t===bk.t&&cb.s===bk.s);
    return `<div class="bp-item${already?' added':''}" onclick="${already?'':'addBookToClass('+classIdx+','+i+',this)'}">
      <div class="bp-cover" style="background:linear-gradient(145deg,${c1},${c2})">
        <div class="bp-cover-name">${bk.t}</div>
      </div>
      <div class="bp-info">
        <div class="bp-name">${bk.t} · ${bk.s}</div>
        <div class="bp-sub">${bk.p} · ${bk.g}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('bookPickerOverlay').classList.add('open');
}

function closeBookPicker(){
  document.getElementById('bookPickerOverlay').classList.remove('open');
}

function addBookToClass(classIdx,bookIdx,el){
  const cls=classGroups[classIdx];
  const bk=myB[bookIdx];
  cls.books.push({t:bk.t,s:bk.s,g:bk.g,p:bk.p,sub:bk.sub});
  // Add random progress for existing students
  cls.students.forEach(st=>{st.bp.push(Math.floor(Math.random()*60))});
  el.classList.add('added');
  el.onclick=null;
  // Refresh detail
  closeBookPicker();
  openClassDetail(classIdx);
}

function removeClassBook(classIdx,bookIdx){
  const cls=classGroups[classIdx];
  cls.books.splice(bookIdx,1);
  cls.students.forEach(st=>{st.bp.splice(bookIdx,1)});
  openClassDetail(classIdx);
}

function mkCard(b,i,wp){
  const [c1,c2]=c(b.sub);
  const pc=(b.pr||0)>=80?'var(--mint-deep)':(b.pr||0)>=40?'var(--peach-deep)':'var(--rose-deep)';
  let st='';
  if(wp) st=b.dl
    ?`<div class="card-st st-ok"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>`
    :`<div class="card-st st-cl"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg></div>`;
  let pg='';
  if(wp) pg=`<div class="prog"><div class="prog-track"><div class="prog-fill" style="width:${b.pr}%;background:${pc}"></div></div><span class="prog-pct">${b.pr}%</span></div>`;
  return `<div class="card" style="animation-delay:${i*0.04}s" onclick="openDetail(${i},'${wp?'my':'lib'}')">${st}<div class="cover"><div class="cover-inner" style="background:linear-gradient(145deg,${c1},${c2})"><span class="cover-grade">${b.g}</span><div class="cover-name">${b.t}</div><div class="cover-sub">${b.s}</div></div></div><div class="detail"><div class="detail-title">${b.t} · ${b.s}</div><div class="detail-row"><span class="detail-pub">${b.p}</span><span class="tag ${b.tp==='r'?'tag-req':'tag-opt'}">${b.tp==='r'?'必修':'选修'}</span></div>${pg}</div></div>`;
}

const SS=['全部科目','语文','数学','英语','物理','化学','生物','历史','地理','政治'];

function renderLib(){
  let list=books;
  if(fG!=='全部')list=list.filter(b=>b.g===fG);
  if(fS!=='全部科目')list=list.filter(b=>b.sub===fS);
  const q=(document.getElementById('sInput').value||'').trim().toLowerCase();
  if(q)list=list.filter(b=>b.t.includes(q)||b.s.includes(q)||b.p.includes(q));

  const gc=GS.map(g=>`<div class="pill ${g===fG?'active':''}" onclick="fG='${g}';renderLib()">${g}</div>`).join('');
  const sc=SS.map(s=>`<div class="pill ${s===fS?'active':''}" onclick="fS='${s}';renderLib()">${s}</div>`).join('');

  const bk=list.length
    ?`<div class="grid">${list.map((b,i)=>mkCard(b,i,false)).join('')}</div>`

}

function go(p){
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.classList.toggle('active',el.dataset.page===p));

  if(p==='library'){t.textContent='数字教材';h.textContent='浏览全部数字教材资源';renderLib()}
  else{t.textContent='我的教材';h.textContent='管理已添加的教材与学习进度';renderMy()}
}
